<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Echovibe</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <link rel="icon" type="image/png" href="logo.png">
  
  <link rel="apple-touch-icon" href="logo.png">
  <meta name="theme-color" content="#3b82f6">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <app-root>
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #f8fafc; font-family: sans-serif;">
      
      <img src="logo.png" alt="Echovibe Logo" style="width: 80px; margin-bottom: 20px; animation: pulse 1.5s infinite; border-radius: 20px;">
      
      <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="color: #64748b; margin-top: 15px; font-weight: 500;">Loading Echovibe...</p>
      
      <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
      </style>
    </div>
  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
