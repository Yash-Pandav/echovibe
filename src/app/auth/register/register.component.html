<div class="glass-container">
  <div class="glass-card">
    
    <div class="brand-header">
      <div class="logo-box">
        <span class="material-symbols-outlined">forum</span>
      </div>
      <h2>Echovibe</h2>
    </div>

    <div class="welcome-text">
      <h3>Create an Account</h3>
      <p>Join us to start chatting</p>
    </div>

    <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>

    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrapper">
        <input type="text" placeholder="Enter your name" [(ngModel)]="name">
        <span class="material-symbols-outlined">person</span>
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrapper">
        <input type="email" placeholder="name@gmail.com" [(ngModel)]="email">
        <span class="material-symbols-outlined">mail</span>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <input type="password" placeholder="••••••••" [(ngModel)]="password" (keyup.enter)="onRegister()">
        <span class="material-symbols-outlined">lock</span>
      </div>
    </div>

    <button class="primary-btn" (click)="onRegister()">Sign Up</button>

    <div class="divider">
      <span>OR</span>
    </div>

    <p class="footer-text">
      Already have an account? <a routerLink="/login">Sign In</a>
    </p>

  </div>
</div>
