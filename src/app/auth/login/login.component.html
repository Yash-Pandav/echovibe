<div class="glass-container">
  <div class="glass-card">
    
    <div class="brand-header">
      <div class="logo-box">
        <span class="material-symbols-outlined">forum</span>
      </div>
      <h2>Echovibe</h2>
    </div>

    <div class="welcome-text">
      <h3>Welcome Back!</h3>
      <p>Sign in to continue</p>
    </div>

    <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrapper">
        <input type="email" placeholder="name@gmail.com" [(ngModel)]="email">
        <span class="material-symbols-outlined">mail</span>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <input type="password" placeholder="••••••••" [(ngModel)]="password" (keyup.enter)="onLogin()">
        <span class="material-symbols-outlined">lock</span>
      </div>
    </div>

    <button class="primary-btn" (click)="onLogin()">Sign In</button>

    <div class="divider">
      <span>OR</span>
    </div>

    <button class="google-btn" (click)="onGoogleLogin()">
      <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <p class="footer-text">
      Don't have an account? <a routerLink="/register">Sign Up</a>
    </p>

  </div>
</div>
